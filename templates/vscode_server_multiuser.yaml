  PublicALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PublicALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: 403
            ContentType: text/html
            MessageBody: |
              <html>
              <body>
              <h1>VSCode Server - User Selection</h1>
              <p>Please select your user workspace:</p>
              <ul>
                <li><a href="/user1">User 1 Workspace</a></li>
                <li><a href="/user2">User 2 Workspace</a></li>
                <li><a href="/user3">User 3 Workspace</a></li>
                <li><a href="/user4">User 4 Workspace</a></li>
                <li><a href="/user5">User 5 Workspace</a></li>
                <li><a href="/user6">User 6 Workspace</a></li>
                <li><a href="/user7">User 7 Workspace</a></li>
                <li><a href="/user8">User 8 Workspace</a></li>
                <li><a href="/user9">User 9 Workspace</a></li>
                <li><a href="/user10">User 10 Workspace</a></li>
              </ul>
              </body>
              </html>

  # Path-based routing rules for each user
  User1ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref PublicALBListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - "/user1*"
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Custom-Secret
            Values:
              - !Sub '${AWS::StackName}-secret-${AWS::AccountId}'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref User1TargetGroup

