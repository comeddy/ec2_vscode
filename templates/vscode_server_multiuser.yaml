  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Multi-User VSCode Server ECS distribution for ${AWS::StackName}"
        Origins:
          - Id: PublicALBOrigin
            DomainName: !GetAtt PublicALB.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 5
            OriginCustomHeaders:
              - HeaderName: X-Custom-Secret
                HeaderValue: !Sub '${AWS::StackName}-secret-${AWS::AccountId}'
        DefaultCacheBehavior:
          TargetOriginId: PublicALBOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
            Headers:
              - '*'
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 0
        PriceClass: PriceClass_All
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-CloudFront'

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VPC-ID"

  CloudFrontURL:
    Description: CloudFront Distribution URL (Use this to access VSCode)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFront-URL"

  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ECS-Cluster"

  EFSFileSystemId:
    Description: EFS File System ID for shared workspace
    Value: !Ref EFSFileSystem
    Export:
      Name: !Sub "${AWS::StackName}-EFS-ID"

  DefaultPassword:
    Description: Default password for all VSCode instances
    Value: "Users can change password by accessing VSCode settings"

  UserInstructions:
    Description: Instructions for users
    Value: !Sub |
      Individual User URLs:
      1. User 1: https://${CloudFrontDistribution.DomainName}/user1
      2. User 2: https://${CloudFrontDistribution.DomainName}/user2
      3. User 3: https://${CloudFrontDistribution.DomainName}/user3
      4. User 4: https://${CloudFrontDistribution.DomainName}/user4
      5. User 5: https://${CloudFrontDistribution.DomainName}/user5
      6. User 6: https://${CloudFrontDistribution.DomainName}/user6
      7. User 7: https://${CloudFrontDistribution.DomainName}/user7
      8. User 8: https://${CloudFrontDistribution.DomainName}/user8
      9. User 9: https://${CloudFrontDistribution.DomainName}/user9
      10. User 10: https://${CloudFrontDistribution.DomainName}/user10
      
      Main Page: https://${CloudFrontDistribution.DomainName} (shows user selection)
      Default Password: Use the password provided during deployment
      
      Persistent Storage:
      - Workspace Files: /workspace (your code and projects)
      - VSCode Settings: /config (themes, preferences, keybindings)
      - User Data: /userdata (workspace settings, recent files)
      - Extensions: /extensions (installed extensions)
      
      Note: All settings, extensions, and files persist across container restarts
      Each user has dedicated container with persistent configuration

  Architecture:
    Description: Path-based Multi-User Architecture with Persistent Storage
    Value: "CloudFront -> ALB (Path-based Routing) -> 10x Dedicated ECS Fargate Containers -> Shared EFS Storage (Workspace + Config + Extensions)"
