AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-User VSCode Server on ECS - 10 containers for 10 users with individual workspaces'

Metadata:
  "AWS::CloudFormation::Interface":
    ParameterGroups:
      - Label:
          default: "Network Configuration"
        Parameters:
         - AvailabilityZoneA
         - AvailabilityZoneB
         - VPCCIDRBlock
         - PublicSubnetABlock
         - PublicSubnetBBlock
         - PrivateSubnetABlock
         - PrivateSubnetBBlock
      - Label:
          default: "VSCode Configuration"
        Parameters:
         - DefaultPassword
         - TaskCpu
         - TaskMemory
         - UserCount

Parameters:
  CloudFrontPrefixListId:
    Type: String
    Description: CloudFront origin-facing managed prefix list ID
    
  AvailabilityZoneA:
    Description: "Choose AZ1 for your VPC"
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-2a
    
  AvailabilityZoneB:
    Description: "Choose AZ2 for your VPC"
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-2b

  VPCCIDRBlock:
    Type: String
    Default: "10.254.0.0/16"
    Description: "CIDR range for the VPC"

  PublicSubnetABlock:
    Type: String
    Default: "10.254.11.0/24"
    Description: "CIDR for public subnet A"

  PublicSubnetBBlock:
    Type: String
    Default: "10.254.12.0/24"
    Description: "CIDR for public subnet B"

  PrivateSubnetABlock:
    Type: String
    Default: "10.254.21.0/24"
    Description: "CIDR for private subnet A"

  PrivateSubnetBBlock:
    Type: String
    Default: "10.254.22.0/24"
    Description: "CIDR for private subnet B"

  DefaultPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: "Default password for all VSCode instances (users can change later)"

  TaskCpu:
    Type: String
    Default: "1024"
    Description: "CPU units per task (1024 = 1 vCPU)"
    AllowedValues:
      - "512"
      - "1024"
      - "2048"

  TaskMemory:
    Type: String
    Default: "2048"
    Description: "Memory per task (MB)"
    AllowedValues:
      - "1024"
      - "2048"
      - "4096"

  UserCount:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 20
    Description: "Number of VSCode containers to create"

Resources:
  # VPC Configuration (same as before)
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDRBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  NatGatewayEIP:
    DependsOn: AttachGateway
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-NATGW-EIP'

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-NATGW'

  # Public Subnets
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetABlock
      AvailabilityZone: !Ref AvailabilityZoneA
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicSubnetA'

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetBBlock
      AvailabilityZone: !Ref AvailabilityZoneB
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicSubnetB'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicRT'

  PublicRoute:
    DependsOn: AttachGateway
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # Private Subnets
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetABlock
      AvailabilityZone: !Ref AvailabilityZoneA
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateSubnetA'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetBBlock
      AvailabilityZone: !Ref AvailabilityZoneB
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateSubnetB'

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateRT-A'

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateRT-B'

  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  # EFS for shared workspace storage
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      CreationToken: !Sub '${AWS::StackName}-efs'
      PerformanceMode: generalPurpose
      ThroughputMode: provisioned
      ProvisionedThroughputInMibps: 100
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EFS'

  EFSMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnetA
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnetB
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # Security Groups
  PublicALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for Internet-facing ALB"
      GroupName: !Sub '${AWS::StackName}-Public-ALB-SG'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !Ref CloudFrontPrefixListId
          Description: "HTTP from CloudFront origin-facing only"
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Public-ALB-SG'

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for ECS VSCode tasks"
      GroupName: !Sub '${AWS::StackName}-ECS-SG'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          SourceSecurityGroupId: !Ref PublicALBSecurityGroup
          Description: "VSCode port from Public ALB only"
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ECS-SG'

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for EFS"
      GroupName: !Sub '${AWS::StackName}-EFS-SG'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: "NFS from ECS tasks"
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EFS-SG'

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-cluster'
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ECS-Cluster'

  # CloudWatch Log Group
  VSCodeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}-vscode'
      RetentionInDays: 7

  # IAM Roles
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ECS-Execution-Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ECS-Execution-Role'

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ECS-Task-Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ECS-Task-Role'

  # Multi-User Task Definition and Services
  VSCodeTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${AWS::StackName}-vscode'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !Ref ECSExecutionRole
      TaskRoleArn: !Ref ECSTaskRole
      Volumes:
        - Name: efs-volume
          EFSVolumeConfiguration:
            FileSystemId: !Ref EFSFileSystem
            RootDirectory: "/"
            TransitEncryption: ENABLED
      ContainerDefinitions:
        - Name: vscode-server
          Image: codercom/code-server:4.126.0
          Essential: true
          PortMappings:
            - ContainerPort: 8888
              Protocol: tcp
          Environment:
            - Name: PASSWORD
              Value: !Ref DefaultPassword
          Command:
            - "--bind-addr"
            - "0.0.0.0:8888"
            - "--auth"
            - "password"
            - "--config-dir"
            - "/config"
            - "--user-data-dir"
            - "/userdata"
            - "--extensions-dir"
            - "/extensions"
            - "/workspace"
          MountPoints:
            - SourceVolume: efs-volume
              ContainerPath: /workspace
              ReadOnly: false
            - SourceVolume: efs-volume
              ContainerPath: /config
              ReadOnly: false
            - SourceVolume: efs-volume
              ContainerPath: /userdata
              ReadOnly: false
            - SourceVolume: efs-volume
              ContainerPath: /extensions
              ReadOnly: false
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref VSCodeLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: vscode
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VSCode-Task'

  # Individual ECS Services for each user
  User1Service:
    Type: AWS::ECS::Service
    DependsOn: PublicALBListener
    Properties:
      ServiceName: !Sub '${AWS::StackName}-user1-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref VSCodeTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: vscode-server
          ContainerPort: 8888
          TargetGroupArn: !Ref User1TargetGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-User1-Service'

  User2Service:
    Type: AWS::ECS::Service
    DependsOn: PublicALBListener
    Properties:
      ServiceName: !Sub '${AWS::StackName}-user2-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref VSCodeTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: vscode-server
          ContainerPort: 8888
          TargetGroupArn: !Ref User2TargetGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-User2-Service'

  User3Service:
    Type: AWS::ECS::Service
    DependsOn: PublicALBListener
    Properties:
      ServiceName: !Sub '${AWS::StackName}-user3-service'
