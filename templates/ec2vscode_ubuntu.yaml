AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy an EC2 instance with VS Code Server using Amazon Linux 2, Amazon Linux 2023, or Ubuntu 22.04 LTS

Parameters:
  AMIType:
    Description: Select the operating system for the EC2 instance
    Type: String
    AllowedValues:
      - AmazonLinux2
      - AmazonLinux2023
      - Ubuntu2204
    Default: Ubuntu2204

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.medium

  DefaultVPCId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC ID

  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: A public subnet in the default VPC

  AmazonLinux2AmiId:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2"

  AmazonLinux2023AmiId:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64"

  UbuntuAmiId:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id"

Conditions:
  UseAmazonLinux2: !Equals [!Ref AMIType, AmazonLinux2]
  UseAmazonLinux2023: !Equals [!Ref AMIType, AmazonLinux2023]
  UseUbuntu2204: !Equals [!Ref AMIType, Ubuntu2204]

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and VS Code ports
      VpcId: !Ref DefaultVPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !If
        - UseAmazonLinux2
        - !Ref AmazonLinux2AmiId
        - !If
            - UseAmazonLinux2023
            - !Ref AmazonLinux2023AmiId
            - !Ref UbuntuAmiId
      IamInstanceProfile: !Ref InstanceProfileSSM
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnetId
          DeviceIndex: 0
          GroupSet:
            - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          OS=$(uname -a)

          if grep -qi amazon /etc/os-release; then
            yum update -y || dnf update -y
            yum install -y git jq curl wget unzip
            yum groupinstall -y "Development Tools" || true
            curl -sL https://rpm.nodesource.com/setup_14.x | bash -
            yum install -y nodejs
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip && sudo ./aws/install
            yum install -y https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm || true
            USERNAME=ec2-user
          else
            apt-get update && apt-get upgrade -y
            apt-get install -y git jq curl wget unzip build-essential
            curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
            apt-get install -y nodejs
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip && sudo ./aws/install
            curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
            dpkg -i session-manager-plugin.deb || true
            USERNAME=ubuntu
          fi

          # Install VS Code Server
          wget https://github.com/coder/code-server/releases/download/v4.126.0/code-server-4.126.0-linux-amd64.tar.gz
          tar -xzf code-server-4.126.0-linux-amd64.tar.gz
          mv code-server-4.126.0-linux-amd64 /usr/local/lib/code-server
          ln -s /usr/local/lib/code-server/bin/code-server /usr/local/bin/code-server

          mkdir -p /home/$USERNAME/.config/code-server
          cat <<EOF > /home/$USERNAME/.config/code-server/config.yaml
          bind-addr: 0.0.0.0:8888
          auth: none
          cert: false
          EOF
          chown -R $USERNAME:$USERNAME /home/$USERNAME/.config

          cat <<EOF > /etc/systemd/system/code-server.service
          [Unit]
          Description=VS Code Server
          After=network.target

          [Service]
          Type=simple
          User=$USERNAME
          ExecStart=/usr/local/bin/code-server --config /home/$USERNAME/.config/code-server/config.yaml
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable code-server
          systemctl start code-server

  InstanceProfileSSM:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - Ref: ServerRoleSSM

  ServerRoleSSM:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM"
        - "arn:aws:iam::aws:policy/AdministratorAccess"
      Path: "/"

Outputs:
  InstancePublicIp:
    Description: Public IP of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
